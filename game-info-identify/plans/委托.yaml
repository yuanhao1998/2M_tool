name: "委托任务"

hotkeys:
  start: f5
  pause: f6
  stop: f7
  exit: esc
repeat:
  times: 73
  switch:
    - action: click
      name: "切换下一个账户"
      target: [5075, 1138]
      wait_after: 3
    - action: wait_match                  # 等待新账户画面加载
      match_region: [4724, 2689, 4807, 2760]
      reference: "images/loaded.png"
      threshold: 0.85
      max_retries: 10
      interval: 2

  steps:

    # --- 外层步骤1 ---
    - action: click
      name: "打开任务"
      target: [4531, 190]
      wait_after: 2

    # --- 外层步骤2 ---
    - action: click
      name: "切换任务面板"
      target: [1150, 710]
      wait_after: 2

    # --- 外层步骤3 ---
    - action: click
      name: "打开任务列表"
      target: [1390, 931]
      wait_after: 2

    # --- 外层步骤4 ---
    - action: click
      name: "选择35任务"
      target: [296, 1988]
      wait_after: 2

    # --- 外层步骤5 ---
    - action: match_click
      name: "检测委托是否完成"
      match_region: [1280, 1065, 1472, 1240]
      reference: "images/委托/委托完成.png"
      threshold: 0.85
      interval: 2
      max_retries: 3
      target: [924, 1174]          # 选择自己的任务
      wait_after: 2
      goto: [6, 2, 1]                       # 已完成 → 跳到子4点击领取
      on_fail:
        - action: match_click
          name: "检测是否存在下一个任务"
          match_region: [1280, 1065, 1472, 1240]
          reference: "images/委托/委托进行.png"
          threshold: 0.85
          max_retries: 3
          goto: [6, 2, 7]                    # 未完成 → 跳到子10传送
          on_fail:
            - action: click
              name: "退出任务界面"
              target: [4851, 211]
              wait_after: 3
            - action: click
              name: "打开传送列表"
              target: [997, 444]
              wait_after: 2
            - action: match_click
              name: "匹配传送并点击第一个目标"
              match_region: [1018, 632, 1296, 762]
              reference: "images/supplies/tp_check.png"
              threshold: 0.85
              target: [647, 920]
              max_retries: 3
              interval: 1
              wait_after: 2
            - action: click
              name: "确认传送"
              target: [1190, 1115]
              wait_after: 3
            - action: stop
            

    # --- 外层步骤6 ---
    - action: while_match
      name: "判断任务状态"
      max_loops: 200
      interval: 2
      cases:
        - match_region: [1280, 1065, 1472, 1240]
          reference: "images/委托/委托进行.png"
          threshold: 0.85
          steps:
            - action: wait
              duration: 2

        - match_region: [1280, 1065,1472, 1240]
          reference: "images/委托/委托完成.png"
          threshold: 0.85
          steps:
            # --- 子1 ---
            - action: click
              name: "点击领取按钮"
              target: [4129, 2534]
              wait_after: 2

            # --- 子2 ---
            - action: click
              name: "选择奖励"
              target: [2520, 1774]
              wait_after: 2

            # --- 子3 ---
            - action: match_click
              name: "判断是否有提示弹框"
              match_region: [2534, 1788, 3322, 1969]
              reference: "images/委托/领取奖励提示.png"
              threshold: 0.85
              target: [2917, 1884]
              max_retries: 3
              interval: 1
              wait_after: 2

            # --- 子4 ---
            - action: click
              name: "领取奖励"
              target: [2508, 2404]
              wait_after: 2
            
            # --- 子5 ---
            - action: click
              name: "选择下一个任务"
              target: [992, 1178]
              wait_after: 2

            # --- 子6 ---
            - action: match_click
              name: "检测此任务委托是否完成"
              match_region: [1280, 1065, 1472, 1240]
              reference: "images/委托/委托完成.png"
              threshold: 0.85
              interval: 2
              max_retries: 3
              target: [924, 1174]          # 选择自己的任务
              wait_after: 2
              goto: 1                       # 已完成 → 领取奖励
              on_fail:
                - action: match_click
                  name: "检测是否存在下一个任务"
                  match_region: [1280, 1065, 1472, 1240]
                  reference: "images/委托/委托进行.png"
                  threshold: 0.85
                  max_retries: 3
                  goto: 7
                  on_fail:
                    - action: click
                      name: "退出任务界面"
                      target: [4851, 211]
                      wait_after: 3
                    - action: click
                      name: "打开传送列表"
                      target: [997, 444]
                      wait_after: 2
                    - action: match_click
                      name: "匹配传送并点击第一个目标"
                      match_region: [1018, 632, 1296, 762]
                      reference: "images/supplies/tp_check.png"
                      threshold: 0.85
                      target: [647, 920]
                      max_retries: 3
                      interval: 1
                      wait_after: 2
                    - action: click
                      name: "确认传送"
                      target: [1190, 1115]
                      wait_after: 3
                    - action: stop
                  

            # --- 子7 ---
            - action: click
              name: "传送到下一个任务"
              target: [4522, 2541]
              wait_after: 2

            # --- 子8 ---
            - action: click
              name: "确认传送到下一个任务"
              target: [2931, 1872]
              wait_after: 2

            # --- 子9 ---
            - action: wait_match
              name: "等待画面加载"
              match_region: [4724, 2689, 4807, 2760]
              reference: "images/loaded.png"
              threshold: 0.85
              max_retries: 10
              interval: 2

            # --- 子10 ---
            - action: click
              name: "打开任务"
              target: [4531, 190]
              wait_after: 2

            # --- 子11 ---
            - action: click
              name: "切换任务面板"
              target: [1150, 710]
              wait_after: 2

      on_fail:
        action: stop