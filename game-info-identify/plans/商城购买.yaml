name: "商店购买"

hotkeys:
  start: f5
  pause: f6
  stop: f7
  exit: esc
repeat:
  times: 42                               # 账户总数
  switch:
    - action: click
      name: "切换下一个账户"
      target: [5075, 1138]
      wait_after: 3
    - action: wait_match                  # 等待新账户画面加载
      match_region: [4724, 2689, 4807, 2760]
      reference: "images/loaded.png"
      threshold: 0.85
      max_retries: 30
      interval: 1
  steps:

    # ====== 步骤1 ======
    - action: click
      name: "进入商店"
      target: [3802, 207]
      wait_after: 5

    # ====== 步骤2 ======
    - action: match_click
      name: "匹配商店广告，判断X"
      match_region: [4729, 2515, 4971, 2720]
      reference: "images/store/store_guanggao.png"
      threshold: 0.85
      target: [4847, 2616]
      max_retries: 5
      interval: 1
      wait_after: 2
      on_fail:
        goto: 3

    # ====== 步骤3 ======
    - action: click_until_match
      name: "验证商店广告是否成功关闭"
      match_region: [4729, 2515, 4971, 2720]
      click_target: [4847, 2616]          # 点 X 关闭广告
      reference: "images/store/store_guanggao.png"
      check_first: true                    # 先检测再点击：匹配→点X消除，不匹配→已关闭
      threshold: 0.85
      max_clicks: 50
      interval: 2
      then_click: [2567, 468]             # 广告消失后点击购买页面
      wait_after: 2
      on_fail:
        action: stop

    # ====== 步骤4 ======
    - action: match_click
      name: "匹配购买页面（自动切换到购买1，无需再点击）"
      match_region: [2449, 364, 2910, 508]
      reference: "images/store/store_list.png"
      threshold: 0.85
      target: [2567, 468]
      max_retries: 2
      interval: 1
      wait_after: 2

    # ====== 步骤5 ======
    - action: match_click
      name: "购买"
      match_region: [4214, 2560, 4901, 2710]
      reference: "images/store/store_buy.png"
      threshold: 0.85
      target: [4555, 2630]
      max_retries: 10
      interval: 1
      wait_after: 1

    # ====== 步骤6 ======
    - action: match_click
      name: "验证是否购买过"
      match_region: [2654, 2143, 2790, 2211]
      reference: "images/store/store_buy_check.png"
      threshold: 0.85
      target: [2129, 2367]
      max_retries: 2
      interval: 1
      wait_after: 2
      goto: 10                            # 已购买过 → 跳到购买2

    # ====== 步骤7 ======
    - action: match_click
      name: "购买确认"
      match_region: [2529, 2275, 3315, 2451]
      reference: "images/store/store_buy_confirm.png"
      threshold: 0.85
      target: [2922, 2364]
      max_retries: 2
      interval: 1
      wait_after: 10

    # ====== 步骤8 ======
    - action: click_until_match
      name: "验证购买1是否完成"
      click_target: [4569, 2630]
      match_region: [2654, 2143, 2790, 2211]
      reference: "images/store/store_buy_check.png"
      threshold: 0.85
      max_clicks: 50
      interval: 1
      then_click: [2129, 2367]
      wait_after: 2
      on_fail:
        action: stop

    # ====== 步骤9 ======
    - action: match_click
      name: "跳转购买2"
      match_region: [4265, 955, 4647, 1042]
      reference: "images/store/store_buy_list2.png"
      threshold: 0.85
      target: [4454, 997]
      max_retries: 10
      interval: 1
      wait_after: 5

    # ====== 步骤10 ======
    - action: match_click
      name: "购买"
      match_region: [4214, 2560, 4901, 2710]
      reference: "images/store/store_buy.png"
      threshold: 0.85
      target: [4555, 2630]
      max_retries: 10
      interval: 1
      wait_after: 1

    # ====== 步骤11 ======
    - action: match_click
      name: "验证是否购买过"
      match_region: [2654, 2143, 2790, 2211]
      reference: "images/store/store_buy_check.png"
      threshold: 0.85
      target: [2129, 2367]
      max_retries: 2
      interval: 1
      wait_after: 2
      goto: 15                            # 已购买过 → 跳到购买4

    # ====== 步骤12 ======
    - action: match_click
      name: "购买确认"
      match_region: [2529, 2275, 3315, 2451]
      reference: "images/store/store_buy_confirm.png"
      threshold: 0.85
      target: [2922, 2364]
      max_retries: 2
      interval: 1
      wait_after: 10

    # ====== 步骤13 ======
    - action: click_until_match
      name: "验证购买2是否完成"
      click_target: [4569, 2630]
      match_region: [2654, 2143, 2790, 2211]
      reference: "images/store/store_buy_check.png"
      threshold: 0.85
      max_clicks: 50
      interval: 1
      then_click: [2129, 2367]
      wait_after: 2
      on_fail:
        action: stop

    # ====== 步骤14 ======
    - action: match_click
      name: "跳转购买4"
      match_region: [4263, 1444, 4649, 1534]
      reference: "images/store/store_buy_list4.png"
      threshold: 0.85
      target: [4456, 1487]
      max_retries: 10
      interval: 1
      wait_after: 5

    # ====== 步骤15 ======
    - action: match_click
      name: "购买"
      match_region: [4214, 2560, 4901, 2710]
      reference: "images/store/store_buy.png"
      threshold: 0.85
      target: [4555, 2630]
      max_retries: 10
      interval: 1
      wait_after: 1

    # ====== 步骤16 ======
    - action: match_click
      name: "购买确认"
      match_region: [2529, 2275, 3315, 2451]
      reference: "images/store/store_buy_confirm.png"
      threshold: 0.85
      target: [2922, 2364]
      max_retries: 2
      interval: 1
      wait_after: 10

    # ====== 步骤17 ======
    - action: click_until_match
      name: "验证购买4是否完成"
      click_target: [4569, 2630]
      match_region: [2654, 2143, 2790, 2211]
      reference: "images/store/store_buy_check.png"
      threshold: 0.85
      max_clicks: 50
      interval: 1
      then_click: [2129, 2367]
      wait_after: 2
      on_fail:
        action: stop

    # ====== 步骤18 ======
    - action: click
      name: "退出商店"
      target: [4854, 209]
      wait_after: 3
