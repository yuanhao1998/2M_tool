name: "钻石统计"

hotkeys:
  start: f5
  pause: f6
  stop: f7
  exit: esc
repeat:
  times: 73                               # 账户总数
  switch:
    - action: click
      name: "切换下一个账户"
      target: [5075, 1138]
      wait_after: 3
    - action: wait_match                  # 等待新账户画面加载
      match_region: [4724, 2689, 4807, 2760]
      reference: "images/loaded.png"
      threshold: 0.85
      max_retries: 30
      interval: 1
  steps:
    # --- 步骤1 ---
    - action: click
      name: "打开任务"
      target: [4531, 190]
      wait_after: 2

    # --- 步骤2 ---
    - action: diamonds
      name: "统计钻石"
      diamond_region: [2291, 127, 2475, 237]
      name_region: [14, 14, 82, 56]

    # --- 步骤3 ---
    - action: click
      name: "退出任务界面"
      target: [4851, 211]
      wait_after: 3